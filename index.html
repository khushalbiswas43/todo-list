<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <span class="navbar-logo">📝</span>
                <span class="navbar-title">Task Master</span>
            </div>
            <div class="navbar-menu">
                <div class="color-picker-container">
                    <button class="nav-btn" id="colorBtn" title="Change theme">🎨</button>
                    <div class="color-picker-menu" id="colorPickerMenu">
                        <div class="color-option" data-theme="purple" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" title="Purple">P</div>
                        <div class="color-option" data-theme="blue" style="background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);" title="Blue">B</div>
                        <div class="color-option" data-theme="green" style="background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);" title="Green">G</div>
                        <div class="color-option" data-theme="orange" style="background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);" title="Orange">O</div>
                        <div class="color-option" data-theme="red" style="background: linear-gradient(135deg, #F44336 0%, #D32F2F 100%);" title="Red">R</div>
                        <div class="color-option" data-theme="pink" style="background: linear-gradient(135deg, #E91E63 0%, #C2185B 100%);" title="Pink">K</div>
                    </div>
                </div>
                <button class="nav-btn" id="darkModeToggle" title="Toggle dark mode">🌙</button>
                <button class="nav-btn" id="exportBtn" title="Export tasks">⬇️</button>
                <button class="nav-btn" id="settingsBtn" title="Settings">⚙️</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="todo-header">
            <h1>📝 My Todo List</h1>
        </div>

        <div class="input-container">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button id="addBtn" class="btn-add">Add</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="stats">
            <p><span id="taskCount">0</span> tasks • <span id="completedCount">0</span> completed</p>
        </div>

        <button id="clearBtn" class="btn-clear">Clear Completed</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
